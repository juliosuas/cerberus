version: "3.9"

services:
  cerberus:
    build: .
    container_name: cerberus
    ports:
      - "5000:5000"
    volumes:
      - cerberus_data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  cerberus_data:
